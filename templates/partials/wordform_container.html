<div class="text-left space-y-4">
    <div>
        <h3 class="text-2xl font-semibold">
            Analyzing:
            <code class="bg-gray-200 p-1 rounded">
                ${wordText}
            </code>
        </h3>
        <p><strong>Sentence Word ID:</strong> ${wordId}</p>
    </div>
    <div>
        <label
            for="parse-select"
            class="block font-medium text-gray-700">
            Choose Parse:
        </label>
        <select
            id="parse-select"
            name="parse-select"
            class="input-field">
        </select>
    </div>
    <div>
        <button id="set-parse-btn" class="btn-primary">
            Set as Chosen Parse
        </button>
    </div>
    <div id="status-message" class="text-sm"></div>
</div>
