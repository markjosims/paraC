<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tira Morphological Parser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .result-box { min-height: 100px; }
                nav { background: #eee; padding: 1rem; margin-bottom: 2rem; border-radius: 8px; }
        nav a { margin-right: 1.5rem; color: #007bff; text-decoration: none; font-weight: bold; }
        h1, h2 { color: #555; }
        .container { padding: 0 2rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 0.6rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        .result { margin-top: 2rem; background: #f9f9f9; padding: 1rem; border-left: 5px solid #007bff; border-radius: 4px; }
        .result-title { margin-top: 0; }
        .result-code { background: #e9e9e9; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th, .result-table td { text-align: center; padding: 8px; border-bottom: 1px solid #ddd; }
        .result-table th { background-color: #f2f2f2; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="mb-8">
            <div class="flex justify-between items-center">
                <h1 class="text-4xl font-bold text-gray-700">Tira Morphological Parser</h1>
                {% if mode == 'test' %}
                    <a href="/" class="px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700">Switch to Normal Mode</a>
                {% else %}
                    <a href="/?mode=test" class="px-4 py-2 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700">Switch to Test Mode</a>
                {% endif %}
            </div>
            <nav class="mt-4 bg-white shadow-sm rounded-lg p-4">
                <a href="/" class="mr-6 font-semibold text-blue-600 hover:text-blue-800">Home</a>
                <a href="/sentences" class="mr-6 font-semibold text-blue-600 hover:text-blue-800">Sentences</a>
                <a href="/lexicon" class="mr-6 font-semibold text-blue-600 hover:text-blue-800">Lexicon</a>
                <a href="/paradigms" class="mr-6 font-semibold text-blue-600 hover:text-blue-800">Generate Paradigms</a>
            </nav>
        </header>
        
        <main class="{% block main_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
