<h2 class="text-2xl font-semibold mb-4 border-b pb-2">1. Parse Inflected Form</h2>
<form action="/parse" method="post">
    <div class="mb-4">
        <label for="inflected_form" class="block text-sm font-medium text-gray-700 mb-1">Enter Verb Form:</label>
        <input type="text" id="inflected_form" name="inflected_form"
               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="e.g., lə̀və̀lɛ̀ðɔ́">
    </div>
    <div class="mb-4">
        {% include '_fv_dropdown.html' %}
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300 ease-in-out">
        Parse
    </button>
</form>
