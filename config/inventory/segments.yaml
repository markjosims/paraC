## Tira phone inventory
# The standard Tira phone inventory consists of:
#             Labial  Dental  Alv.    Retro.  Palatal Velar
# Nasal:      m               n               ɲ       ŋ
# Stop:       p       t̪       t               c       k
#             b       d̪       d               ɟ       g
# Fricative:  f               s
#             v       ð
# Glide:      w                               j
# Lateral:                    l
# Trill:                      r      
# Tap/flap:                   ɾ       ɽ
#
# The postalveolar fricative ʃ, the glottal fricative h and the glottal stop ʔ
# are used occasionally in loanwords from English.
# Vowels:
#             Front       Central     Back
# High:       i                       u
#             ɪ                       ʊ
# Mid:        e           ə           o
#             ɛ           ɜ           ɔ
# Low:                    a
kind: Inventory
data:
  consonants:
  # the `repr` key gives a short representation for the entire class
    _ref: "<C>"
    stops:
      _ref: "<PLSV>"
      voiced:
        _ref: "<P>"
        _phones: ['b', 'd̪', 'd', 'ɟ', 'g']
      voiceless:
        _ref: "<B>"
        _phones: ['p', 't̪', 't', 'c', 'k', 'ʔ']
    nasals:
      _ref: "<N>"
      _phones: ['m', 'n', 'ɲ', 'ŋ']
    fricatives:
      _ref: "<F>"
      _phones: ['f', 'v', 'ð', 's', 'ʃ', 'h']
    resonants:
      _ref: "<R>"
      _phones: ['l', 'r', 'ɾ', 'ɽ']
      glides:
        _ref: "<Glide>"
        _phones: ['j', 'w']
  vowels:
    _ref: "<V>"
    high:
      _ref: "<V_High>"
      _phones: ['i', 'ɪ', 'u', 'ʊ']
    mid:
      _ref: "<V_Mid>"
      _phones: ['e', 'ɛ', 'ə', 'ɜ', 'o', 'ɔ']
    low:
      _ref: "<V_Low>"
      _phones: ['a']