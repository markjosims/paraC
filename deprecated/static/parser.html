{% extends "base.html" %}

{% block title %}M4 - Parser{% endblock %}

{% block content %}
<h1 class="mb-4">Parser</h1>
<p class="text-muted mb-4">Parse a word to get its morphological analysis.</p>

<div class="row">
    <div class="col-lg-6">
        <div class="mb-3">
            <label for="word" class="form-label">Word</label>
            <input type="text" class="form-control" id="word" placeholder="Enter word to parse">
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="fuzzyMatch">
                <label class="form-check-label" for="fuzzyMatch">
                    Use fuzzy match
                </label>
            </div>
            <small class="text-muted">Enable to find approximate matches when exact parsing fails.</small>
        </div>

        <button type="button" class="btn btn-primary" id="parseBtn">Parse</button>
    </div>
</div>

<div class="row mt-4">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-header">Results</div>
            <div class="card-body" id="results">
                <p class="text-muted">Results will appear here.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('parseBtn').addEventListener('click', async () => {
    const word = document.getElementById('word').value.trim();
    if (!word) {
        alert('Please enter a word');
        return;
    }

    const fuzzy = document.getElementById('fuzzyMatch').checked;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<p>Loading...</p>';

    try {
        const response = await fetch('/parser/parse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word, fuzzy })
        });

        const result = await response.json();

        if (result.error) {
            resultsDiv.innerHTML = `<p class="text-danger">${result.error}</p>`;
        } else if (result.results && result.results.length > 0) {
            let html = '<div class="list-group">';
            for (const item of result.results) {
                const weight = item.weight ? `<span class="badge bg-secondary weight-badge">${item.weight.toFixed(2)}</span>` : '';
                html += `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="fw-bold">${item.gloss}</div>
                            ${weight}
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            resultsDiv.innerHTML = html;
        } else {
            resultsDiv.innerHTML = '<p class="text-muted">No results found.</p>';
        }
    } catch (error) {
        resultsDiv.innerHTML = `<p class="text-danger">Error: ${error.message}</p>`;
    }
});

document.getElementById('word').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('parseBtn').click();
    }
});
</script>
{% endblock %}
