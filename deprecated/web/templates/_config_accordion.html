<aside class="panel" id="config-sidebar">
  <h2>YAML files</h2>
  <p class="muted"><code>{{ selected_source_label }}</code></p>

  <div class="accordion">
    {% for group in yaml_groups %}
      <details class="accordion-item" id="{{ group.dom_id }}" {% if group.kind == selected_kind %}open{% endif %}>
        <summary>{{ group.kind }} <span class="muted">({{ group.count }})</span></summary>
        <div class="file-list">
          {% for item in group.config_items %}
            <div class="file-entry">
              <a class="file-link {% if item.path == selected_path %}active{% endif %}" href="{{ url_for('web.config', path=item.path) }}">{{ item.label }}</a>
              <div class="file-actions">
                <button type="button" class="btn-icon" title="Rename" onclick="openRenameDialog('{{ item.path }}', '{{ item.label }}')">&#9998;</button>
                <button type="button" class="btn-icon btn-danger" title="Delete" onclick="confirmDelete('{{ item.path }}')">&#10005;</button>
              </div>
            </div>
          {% endfor %}
        </div>
      </details>
    {% endfor %}
  </div>

  <form method="post" action="{{ url_for('web.config_editor') }}" class="grid">
    <h3>Create config file</h3>
    <label>
      Config type
      <select name="new_kind">
        {% for kind in available_kinds %}
          <option value="{{ kind }}" {% if kind == (selected_kind or 'Inventory') %}selected{% endif %}>{{ kind }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      File name
      <input type="text" name="file_stem" placeholder="segments">
    </label>
    <button type="submit" name="action" value="new">Start new file</button>
  </form>
</aside>

<!-- Rename dialog -->
<dialog id="rename-dialog">
  <form method="post" action="{{ url_for('web.config_rename') }}" class="grid" style="min-width:18rem">
    <h3 style="margin:0">Rename file</h3>
    <input type="hidden" name="old_path" id="rename-old-path">
    <label>
      New path
      <input type="text" name="new_path" id="rename-new-path" required>
    </label>
    <div class="actions">
      <button type="submit">Rename</button>
      <button type="button" onclick="document.getElementById('rename-dialog').close()">Cancel</button>
    </div>
  </form>
</dialog>

<!-- Delete form (hidden) -->
<form id="delete-form" method="post" action="{{ url_for('web.config_delete') }}" style="display:none">
  <input type="hidden" name="path" id="delete-path">
</form>

<style>
  .file-entry { display: flex; align-items: center; gap: 0.25rem; }
  .file-entry .file-link { flex: 1; }
  .file-actions { display: flex; gap: 0.15rem; flex-shrink: 0; }
  .btn-icon { background: none; border: none; cursor: pointer; padding: 0.2rem 0.35rem; font-size: 0.85rem; color: #666; line-height: 1; }
  .btn-icon:hover { color: #333; background: #eee; }
  .btn-icon.btn-danger:hover { color: #c33; background: #fff0f0; }
  #rename-dialog { border: 1px solid #ccc; border-radius: 4px; padding: 1rem; }
  #rename-dialog::backdrop { background: rgba(0,0,0,0.3); }
</style>

<script>
function openRenameDialog(oldPath, label) {
  document.getElementById('rename-old-path').value = oldPath;
  document.getElementById('rename-new-path').value = oldPath;
  document.getElementById('rename-dialog').showModal();
}

function confirmDelete(path) {
  if (confirm('Delete "' + path + '"? This cannot be undone.')) {
    document.getElementById('delete-path').value = path;
    document.getElementById('delete-form').submit();
  }
}
</script>
