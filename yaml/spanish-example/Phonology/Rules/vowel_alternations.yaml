kind: Rules
rules:
  - description:
      "/e/ becomes [ie] and /o/ becomes [ue] in stressed syllables for certain
      verbs

      "
    name: diphthongization
    right_context: <C>*#
    string_map:
      - - e
        - ie
      - - o
        - ue
  - description: "/e/ becomes [i] in stressed syllables

      "
    input_pattern: e
    name: stressed_e_to_i
    output_pattern: i
    right_context: <C>*#
