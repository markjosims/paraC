name: parC
channels:
  - conda-forge
  - defaults
dependencies:
  # Core language and conda packages
  - python=3.10
  - pandas
  - tqdm
  - openpyxl
  - pynini==2.1.6
  - graphviz
  - pydot
  - pyyaml
  - loguru
  - pygments>=2.19.2
  - pytest>=8.3.5
  - jsonschema>=4.23.0
  - fastapi>=0.124.4
  - uvicorn>=0.33.0
  # Packages installed via pip
  - pip
  - pip:
      - dotenv
